[workspace]
members = [
    "workflow_core",
    "workflow_utils",
]
resolver = "2"

[workspace.dependencies]
workflow_core = { path = "workflow_core" }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
petgraph = "0.8"
tokio-rusqlite = "0.5"
async-trait = "0.1"
tokio-util = { version = "0.7" }
nix = { version = "0.29", features = ["process", "signal"] }
