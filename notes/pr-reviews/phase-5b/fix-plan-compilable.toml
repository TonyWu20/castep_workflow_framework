# ─────────────────────────────────────────────────────────────────
# TASK-1: Fix approx_constant clippy error — 2.71828 approximates E
# ─────────────────────────────────────────────────────────────────
[tasks.TASK-1]
description = "Change 2.71828 to 42.0 in parse_single_value test to avoid clippy treating it as std::f64::consts::E (approx_constant lint)."
type = "replace"
severity = "blocking"
acceptance = [
    "cargo clippy -p hubbard_u_sweep_slurm --all-targets -- -D warnings 2>&1 | grep -qv 'approx_constant'",
    "cargo test -p hubbard_u_sweep_slurm",
]

[[tasks.TASK-1.changes]]
file = "examples/hubbard_u_sweep_slurm/src/config.rs"
before = '''        let vals = parse_u_values("2.71828").unwrap();
        assert_eq!(vals, vec![2.71828]);'''
after = '''        let vals = parse_u_values("42.0").unwrap();
        assert_eq!(vals, vec![42.0]);'''

