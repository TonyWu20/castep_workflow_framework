# ─────────────────────────────────────────────────────────────────
# TASK-6: Use run_default() in local mode for hubbard_u_sweep_slurm
# ─────────────────────────────────────────────────────────────────
[tasks.TASK-6]
description = "Branch on config.local at the run site: local mode uses run_default(&mut workflow, &mut state), SLURM mode keeps manual Arc wiring."
type = "replace"
severity = "minor"
depends_on = ["TASK-5"]
acceptance = [
    "cargo check -p hubbard_u_sweep_slurm",
    "cargo clippy -p hubbard_u_sweep_slurm --all-targets -- -D warnings",
]

[[tasks.TASK-6.changes]]
file = "examples/hubbard_u_sweep_slurm/src/main.rs"
before = '''    let state_path = std::path::PathBuf::from(".hubbard_u_sweep_slurm.workflow.json");
    let mut state = JsonStateStore::new("hubbard_u_sweep_slurm", state_path);
    let runner: Arc<dyn ProcessRunner> = Arc::new(SystemProcessRunner::new());
    let executor: Arc<dyn HookExecutor> = Arc::new(ShellHookExecutor);

    let summary = workflow.run(&mut state, runner, executor)?;
    println!(
        "Workflow complete: {} succeeded, {} failed, {} skipped ({:.1}s)",
        summary.succeeded.len(),
        summary.failed.len(),
        summary.skipped.len(),
        summary.duration.as_secs_f64(),
    );
    Ok(())'''
after = '''    let state_path = std::path::PathBuf::from(".hubbard_u_sweep_slurm.workflow.json");
    let mut state = JsonStateStore::new("hubbard_u_sweep_slurm", state_path);

    let summary = if config.local {
        run_default(&mut workflow, &mut state)?
    } else {
        let runner: Arc<dyn ProcessRunner> = Arc::new(SystemProcessRunner::new());
        let executor: Arc<dyn HookExecutor> = Arc::new(ShellHookExecutor);
        workflow.run(&mut state, runner, executor)?
    };

    println!(
        "Workflow complete: {} succeeded, {} failed, {} skipped ({:.1}s)",
        summary.succeeded.len(),
        summary.failed.len(),
        summary.skipped.len(),
        summary.duration.as_secs_f64(),
    );
    Ok(())'''

