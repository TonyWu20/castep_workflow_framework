# Change 9 — downstream_tasks: accept &TaskSuccessors instead of &HashMap
[[tasks.TASK-3.changes]]
file = "workflow-cli/src/main.rs"
before = '''
fn downstream_tasks(
    start: &[String],
    successors: &HashMap<String, Vec<String>>,
) -> std::collections::HashSet<String> {
    let mut visited = std::collections::HashSet::new();
    let mut queue: std::collections::VecDeque<String> = start.iter().cloned().collect();
    while let Some(id) = queue.pop_front() {
        if let Some(deps) = successors.get(&id) {
            for dep in deps {
                if visited.insert(dep.clone()) {
                    queue.push_back(dep.clone());
                }
            }
        }
    }
    visited
}
'''
