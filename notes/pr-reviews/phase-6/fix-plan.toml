before = '''fn build_chain(
    config: &SweepConfig,
    u: f64,
    second: &str,
    seed_cell: &str,
    seed_param: &str,
) -> Result<Vec<Task>, WorkflowError> {
    let scf = build_one_task(config, u, second, seed_cell, seed_param)?;
    // DOS task depends on SCF completing successfully
    let dos_id = format!("dos_{second}");
