    /// ```
    /// # use workflow_core::task::ExecutionMode;
    /// let mode = ExecutionMode::direct("castep", &["ZnO"]);
    /// ```
    pub fn direct(command: impl Into<String>, args: &[&str]) -> Self {
        Self::Direct {
            command: command.into(),
            args: args.iter().map(|s| (*s).to_owned()).collect(),
            env: HashMap::new(),
            timeout: None,
